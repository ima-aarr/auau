<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Neon Survivor</title>
<style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
    #scoreBoard { position: absolute; top: 15px; left: 15px; font-size: 24px; user-select: none; }
    #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(255,255,255,0.1); padding: 50px; border-radius: 12px; }
    button { padding: 12px 24px; font-size: 20px; cursor: pointer; border: none; background: #fff; color: #000; border-radius: 6px; margin-top: 20px; font-weight: bold; transition: background 0.2s; }
    button:hover { background: #ddd; }
</style>
</head>
<body>
<div id="scoreBoard">Score: <span id="score">0</span></div>
<div id="ui">
    <h1 style="margin:0; font-size:48px;" id="finalScore">0</h1>
    <p style="margin-top:10px; color:#ccc;">Click to Shoot</p>
    <button id="startBtn">Start Game</button>
</div>
<canvas></canvas>
<script>
const canvas = document.querySelector('canvas');
const ctx = canvas.getContext('2d');
canvas.width = innerWidth;
canvas.height = innerHeight;
const scoreEl = document.querySelector('#score');
const startBtn = document.querySelector('#startBtn');
const ui = document.querySelector('#ui');
const finalScore = document.querySelector('#finalScore');

class Player {
    constructor(x, y, radius, color) {
        this.x = x; this.y = y; this.radius = radius; this.color = color;
    }
    draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill();
    }
}

class Projectile {
    constructor(x, y, radius, color, velocity) {
        this.x = x; this.y = y; this.radius = radius; this.color = color; this.velocity = velocity;
    }
    draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill();
    }
    update() {
        this.draw(); this.x += this.velocity.x; this.y += this.velocity.y;
    }
}

class Enemy {
    constructor(x, y, radius, color, velocity) {
        this.x = x; this.y = y; this.radius = radius; this.color = color; this.velocity = velocity;
    }
    draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill();
    }
    update() {
        this.draw(); this.x += this.velocity.x; this.y += this.velocity.y;
    }
}

const friction = 0.98;
class Particle {
    constructor(x, y, radius, color, velocity) {
        this.x = x; this.y = y; this.radius = radius; this.color = color; this.velocity = velocity; this.alpha = 1;
    }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
    }
    update() {
        this.draw(); this.velocity.x *= friction; this.velocity.y *= friction; this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.015;
    }
}

let player = new Player(canvas.width / 2, canvas.height / 2, 12, 'white');
let projectiles = [];
let enemies = [];
let particles = [];
let animationId;
let score = 0;
let spawnInterval;

function init() {
    player = new Player(canvas.width / 2, canvas.height / 2, 12, 'white');
    projectiles = []; enemies = []; particles = []; score = 0; scoreEl.innerHTML = score; finalScore.innerHTML = score;
}

function spawnEnemies() {
    spawnInterval = setInterval(() => {
        const radius = Math.random() * (35 - 8) + 8;
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius; y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width; y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
        }
        const color = `hsl(${Math.random() * 360}, 60%, 50%)`;
        const angle = Math.atan2(canvas.height / 2 - y, canvas.width / 2 - x);
        const velocity = { x: Math.cos(angle) * (1 + Math.random()), y: Math.sin(angle) * (1 + Math.random()) };
        enemies.push(new Enemy(x, y, radius, color, velocity));
    }, 1000);
}

function animate() {
    animationId = requestAnimationFrame(animate);
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    player.draw();
    particles.forEach((particle, index) => {
        if (particle.alpha <= 0) { particles.splice(index, 1); } else { particle.update(); }
    });
    projectiles.forEach((projectile, index) => {
        projectile.update();
        if (projectile.x + projectile.radius < 0 || projectile.x - projectile.radius > canvas.width || projectile.y + projectile.radius < 0 || projectile.y - projectile.radius > canvas.height) {
            setTimeout(() => { projectiles.splice(index, 1); }, 0);
        }
    });
    enemies.forEach((enemy, index) => {
        enemy.update();
        const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
        if (dist - enemy.radius - player.radius < 1) {
            cancelAnimationFrame(animationId); clearInterval(spawnInterval); ui.style.display = 'block'; finalScore.innerHTML = score;
        }
        projectiles.forEach((projectile, pIndex) => {
            const dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);
            if (dist - enemy.radius - projectile.radius < 1) {
                for (let i = 0; i < enemy.radius * 2; i++) {
                    particles.push(new Particle(projectile.x, projectile.y, Math.random() * 3, enemy.color, { x: (Math.random() - 0.5) * (Math.random() * 7), y: (Math.random() - 0.5) * (Math.random() * 7) }));
                }
                if (enemy.radius - 12 > 10) {
                    score += 10; scoreEl.innerHTML = score;
                    enemy.radius -= 10;
                    setTimeout(() => { projectiles.splice(pIndex, 1); }, 0);
                } else {
                    score += 50; scoreEl.innerHTML = score;
                    setTimeout(() => { enemies.splice(index, 1); projectiles.splice(pIndex, 1); }, 0);
                }
            }
        });
    });
}

addEventListener('click', (event) => {
    const angle = Math.atan2(event.clientY - canvas.height / 2, event.clientX - canvas.width / 2);
    const velocity = { x: Math.cos(angle) * 8, y: Math.sin(angle) * 8 };
    projectiles.push(new Projectile(canvas.width / 2, canvas.height / 2, 6, '#fff', velocity));
});

startBtn.addEventListener('click', () => {
    init(); animate(); spawnEnemies(); ui.style.display = 'none';
});

addEventListener('resize', () => {
    canvas.width = innerWidth; canvas.height = innerHeight;
    player.x = canvas.width / 2; player.y = canvas.height / 2;
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Node Defender: Advanced</title>
<style>
    /* 画面のスクロールやズームを防止し、タップ操作を安定させる */
    body { margin: 0; overflow: hidden; background: #030308; color: #e0e0ff; font-family: 'Courier New', Courier, monospace; user-select: none; -webkit-user-select: none; touch-action: none; }
    canvas { display: block; }
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; }
    
    /* サイドバーの基本設定 */
    #sidebar { width: 320px; background: rgba(5, 5, 15, 0.95); border-right: 1px solid #00ffff; display: flex; flex-direction: column; pointer-events: auto; z-index: 10; height: 100vh; box-shadow: 2px 0 15px rgba(0, 255, 255, 0.1); }
    #stats { padding: 15px; border-bottom: 1px solid #1a334d; background: #0a0a1a; }
    .stat-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-bottom: 8px; color: #00ffff; letter-spacing: 1px; }
    .stat-row span { color: #ffffff; text-shadow: 0 0 8px #00ffff; }
    #controls { padding: 10px; border-bottom: 1px solid #1a334d; display: flex; gap: 5px; flex-wrap: wrap; }
    button { background: #001122; border: 1px solid #00ffff; color: #00ffff; padding: 10px; cursor: pointer; font-weight: bold; flex-grow: 1; text-transform: uppercase; font-size: 11px; transition: all 0.2s; box-sizing: border-box; }
    button:hover:not(:disabled) { background: #00ffff; color: #000; box-shadow: 0 0 10px #00ffff; }
    button:disabled { border-color: #333; color: #555; cursor: not-allowed; background: transparent; }
    
    #buildMenu { flex-grow: 1; overflow-y: auto; padding: 10px; }
    #buildMenu::-webkit-scrollbar { width: 4px; }
    #buildMenu::-webkit-scrollbar-thumb { background: #00ffff; }
    
    .node-card { background: #080814; border: 1px solid #1a334d; border-left: 4px solid #00ffff; margin-bottom: 10px; padding: 10px; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
    .node-card:hover, .node-card.selected { background: #112233; border-color: #00ffff; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
    .n-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
    .n-name { font-weight: bold; font-size: 14px; color: #fff; text-shadow: 0 0 3px currentColor; }
    .n-cost { color: #ffea00; font-weight: bold; font-size: 13px; text-shadow: 0 0 5px rgba(255,234,0,0.5); }
    .n-desc { font-size: 11px; color: #aaa; margin-bottom: 5px; line-height: 1.3; }
    .n-stats { font-size: 10px; color: #0ff; display: grid; grid-template-columns: 1fr 1fr; gap: 3px; background: rgba(0,255,255,0.05); padding: 4px; }
    
    /* アクションパネル */
    #actionPanel { position: absolute; bottom: 20px; left: 340px; background: rgba(5, 5, 15, 0.95); padding: 20px; border: 1px solid #00ffff; pointer-events: auto; display: none; z-index: 10; min-width: 250px; box-shadow: 0 0 25px rgba(0, 255, 255, 0.15); backdrop-filter: blur(5px); }
    #actionPanel h3 { margin: 0 0 15px 0; color: #00ffff; border-bottom: 1px solid #1a334d; padding-bottom: 5px; font-size: 16px; }
    .ap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; font-size: 12px; }
    .ap-grid div { color: #888; display: flex; justify-content: space-between; border-bottom: 1px dotted #333; padding-bottom: 2px; }
    .ap-grid span { color: #fff; font-weight: bold; }
    .ap-actions { display: flex; gap: 5px; }
    .btn-sell { border-color: #ff3366; color: #ff3366; }
    .btn-sell:hover:not(:disabled) { background: #ff3366; color: #000; box-shadow: 0 0 15px #ff3366; }
    
    /* スマホ画面向けのレイアウト調整 (画面幅が768px以下の場合) */
    @media (max-width: 768px) {
        #sidebar { width: 140px; } /* スマホではサイドバーを細くしてCanvas領域を確保 */
        .n-desc { display: none; } /* 説明文を隠して省スペース化 */
        .stat-row { font-size: 12px; }
        .n-name { font-size: 11px; }
        #actionPanel { left: 150px; bottom: 10px; padding: 10px; min-width: 180px; }
        #actionPanel h3 { font-size: 14px; margin-bottom: 10px; }
        .ap-grid { font-size: 10px; margin-bottom: 10px; gap: 5px; }
    }
</style>
</head>
<body>
<div id="ui">
    <div id="sidebar">
        <div id="stats">
            <div class="stat-row">WAVE <span><span id="uiWave">1</span></span></div>
            <div class="stat-row">CORE <span><span id="uiCore">1000</span></span></div>
            <div class="stat-row">CREDIT<span><span id="uiCoins">600</span></span></div>
        </div>
        <div id="controls">
            <button id="btnNextWave">START WAVE</button>
        </div>
        <div id="buildMenu"></div>
    </div>
</div>
<div id="actionPanel">
    <h3 id="apName">NODE</h3>
    <div class="ap-grid">
        <div>LVL <span id="apLvl">1</span></div>
        <div>DMG <span id="apDmg">0</span></div>
        <div>RNG <span id="apRng">0</span></div>
        <div>SPD <span id="apRate">0</span></div>
    </div>
    <div id="apSpecial" style="font-size: 11px; color: #0f0; margin-bottom: 10px; text-align: center; height: 12px; font-weight: bold;"></div>
    <div class="ap-actions">
        <button id="btnUpg">UPG <br><span id="apCost" style="font-size:9px;">0</span></button>
        <button id="btnSell" class="btn-sell">SELL <br><span id="apSell" style="font-size:9px;">0</span></button>
        <button id="btnClose" style="border-color:#555; color:#aaa;">X</button>
    </div>
</div>
<canvas></canvas>

<script>
const canvas = document.querySelector('canvas');
const ctx = canvas.getContext('2d');
const gridSize = 40;
let sidebarWidth = 320;
let cols, rows;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    // 画面幅に応じてサイドバーの幅（クリック無効領域）を計算
    sidebarWidth = window.innerWidth <= 768 ? 140 : 320;
    cols = Math.floor(canvas.width / gridSize);
    rows = Math.floor(canvas.height / gridSize);
    updateCorePos();
}
window.addEventListener('resize', resize);

const corePos = { x: 0, y: 0 };
function updateCorePos() {
    corePos.x = Math.floor(((canvas.width - sidebarWidth) / 2 + sidebarWidth) / gridSize) * gridSize + gridSize / 2;
    corePos.y = Math.floor(canvas.height / 2 / gridSize) * gridSize + gridSize / 2;
}

// 防衛機器データ
const NODE_TYPES = {
    blaster:  { name: 'BLASTER', cost: 50,  dmg: 12, range: 120, rate: 40,  color: '#ffffff', type: 'normal', desc: '安価で標準的な連射砲。' },
    vulcan:   { name: 'VULCAN',  cost: 140, dmg: 4,  range: 100, rate: 6,   color: '#ffff00', type: 'normal', desc: '超高速連射。ダメージは低いが弾幕を張る。' },
    railgun:  { name: 'RAILGUN', cost: 220, dmg: 120,range: 350, rate: 120, color: '#ff00ff', type: 'normal', desc: '超遠距離からの一撃必殺。装填は遅い。' },
    mortar:   { name: 'MORTAR',  cost: 200, dmg: 35, range: 160, rate: 90,  color: '#ff5500', type: 'splash', radius: 60, desc: '着弾時に爆発し、範囲ダメージ。' },
    cryo:     { name: 'CRYO',    cost: 160, dmg: 5,  range: 120, rate: 60,  color: '#00ffff', type: 'slow', factor: 0.5, time: 180, desc: '敵の移動速度を一時半減させる。' },
    toxin:    { name: 'TOXIN',   cost: 240, dmg: 2,  range: 140, rate: 50,  color: '#00ff00', type: 'poison', dot: 5, dotTime: 300, desc: '毒を注入し、長期間ダメージ。' },
    laser:    { name: 'LASER',   cost: 300, dmg: 1.5,range: 220, rate: 1,   color: '#ff0055', type: 'beam', desc: '照射し続ける高熱レーザー。' },
    emp:      { name: 'EMP',     cost: 350, dmg: 1,  range: 110, rate: 150, color: '#aaaaaa', type: 'stun', time: 90, desc: 'パルスで周囲の敵を麻痺させる。' },
    miner:    { name: 'MINER',   cost: 250, dmg: 0,  range: 0,   rate: 0,   color: '#ffaa00', type: 'income', value: 40, desc: '毎ウェーブ終了時クレジット生成。' }
};

let state = {
    wave: 1, coreHp: 1000, coins: 600, waveActive: false,
    nodes: [], enemies: [], bullets: [], particles: []
};

let selectedBuildType = null;
let selectedNode = null;
let frame = 0;
let enemySpawnTimer = 0;
let enemiesToSpawn = 0;
let waveEnemyMaxHpBase = 30;

const els = {
    wave: document.getElementById('uiWave'), core: document.getElementById('uiCore'), coins: document.getElementById('uiCoins'),
    btnNext: document.getElementById('btnNextWave'), buildMenu: document.getElementById('buildMenu'),
    ap: document.getElementById('actionPanel'), apName: document.getElementById('apName'), apLvl: document.getElementById('apLvl'),
    apDmg: document.getElementById('apDmg'), apRng: document.getElementById('apRng'), apRate: document.getElementById('apRate'),
    apSpecial: document.getElementById('apSpecial'), apCost: document.getElementById('apCost'), apSell: document.getElementById('apSell'),
    btnUpg: document.getElementById('btnUpg'), btnSell: document.getElementById('btnSell'), btnClose: document.getElementById('btnClose')
};

function updateUI() {
    els.wave.innerText = state.wave;
    els.core.innerText = Math.floor(state.coreHp);
    els.coins.innerText = Math.floor(state.coins);
    
    document.querySelectorAll('.node-card').forEach(card => {
        const cost = parseInt(card.dataset.cost);
        if(state.coins < cost) {
            card.style.opacity = '0.4'; card.style.borderColor = '#333';
        } else {
            card.style.opacity = '1'; card.style.borderColor = card.classList.contains('selected') ? '#00ffff' : '#1a334d';
        }
    });

    if(state.coreHp <= 0) alert('GAME OVER! ページをリロードしてください。');
}

Object.keys(NODE_TYPES).forEach(key => {
    const t = NODE_TYPES[key];
    const card = document.createElement('div');
    card.className = 'node-card'; card.dataset.type = key; card.dataset.cost = t.cost;
    card.innerHTML = `<div class="n-header"><span class="n-name" style="color:${t.color}">${t.name}</span><span class="n-cost">$${t.cost}</span></div>
                      <div class="n-desc">${t.desc}</div>
                      <div class="n-stats"><div>DMG <span>${t.dmg}</span></div><div>RNG <span>${t.range}</span></div></div>`;
    card.onclick = () => {
        document.querySelectorAll('.node-card').forEach(b => b.classList.remove('selected'));
        if(selectedBuildType === key) { selectedBuildType = null; } 
        else { card.classList.add('selected'); selectedBuildType = key; closeActionPanel(); }
    };
    els.buildMenu.appendChild(card);
});

function openActionPanel(node) {
    selectedNode = node; selectedBuildType = null;
    document.querySelectorAll('.node-card').forEach(b => b.classList.remove('selected'));
    const t = NODE_TYPES[node.type];
    els.apName.innerText = t.name; els.apName.style.color = t.color; els.apLvl.innerText = node.lvl;
    
    let dmgMulti = t.type === 'income' ? 1.5 : 1.2;
    els.apDmg.innerText = t.type === 'income' ? '-' : (t.dmg * Math.pow(dmgMulti, node.lvl - 1)).toFixed(1);
    els.apRng.innerText = t.range === 0 ? '-' : (t.range * Math.pow(1.05, node.lvl - 1)).toFixed(0);
    els.apRate.innerText = t.rate === 0 ? '-' : (60/Math.max(1, t.rate * Math.pow(0.95, node.lvl - 1))).toFixed(1)+'/s';
    
    const upgCost = Math.floor(t.cost * Math.pow(1.6, node.lvl));
    const sellValue = Math.floor(t.cost * Math.pow(1.6, node.lvl - 1) * 0.5);
    els.apCost.innerText = '$' + upgCost; els.apSell.innerText = '$' + sellValue;
    els.btnUpg.disabled = state.coins < upgCost;
    els.ap.style.display = 'block';
}

function closeActionPanel() { selectedNode = null; els.ap.style.display = 'none'; }
els.btnClose.onclick = closeActionPanel;

els.btnUpg.onclick = () => {
    const cost = Math.floor(NODE_TYPES[selectedNode.type].cost * Math.pow(1.6, selectedNode.lvl));
    if(state.coins >= cost) { state.coins -= cost; selectedNode.lvl++; openActionPanel(selectedNode); updateUI(); }
};

els.btnSell.onclick = () => {
    state.coins += Math.floor(NODE_TYPES[selectedNode.type].cost * Math.pow(1.6, selectedNode.lvl - 1) * 0.5);
    state.nodes = state.nodes.filter(n => n !== selectedNode);
    closeActionPanel(); updateUI();
};

els.btnNext.onclick = () => {
    if(state.waveActive) return;
    state.waveActive = true;
    enemiesToSpawn = 10 + Math.floor(state.wave * 3);
    enemySpawnTimer = 0;
    els.btnNext.disabled = true; els.btnNext.innerText = 'WAVE IN PROGRESS';
    closeActionPanel();
};

function spawnEnemy() {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.max(canvas.width, canvas.height) + 50;
    const hp = waveEnemyMaxHpBase * Math.pow(1.35, state.wave - 1);
    state.enemies.push({ x: corePos.x + Math.cos(angle)*dist, y: corePos.y + Math.sin(angle)*dist, 
                         hp: hp, maxHp: hp, speed: 0.8 + Math.random()*0.4 + (state.wave*0.03), 
                         radius: 10, color: '#ff2255', reward: Math.floor(3 + state.wave*0.5), slow: 1, sTimer: 0, pDmg: 0, pTimer: 0, stunTimer: 0 });
}

// mousedown から pointerdown に変更（スマホのタップにも確実に対応）
canvas.addEventListener('pointerdown', e => {
    if(e.clientX < sidebarWidth) return;
    const gx = Math.floor(e.clientX / gridSize) * gridSize + gridSize / 2;
    const gy = Math.floor(e.clientY / gridSize) * gridSize + gridSize / 2;
    if(gx === corePos.x && gy === corePos.y) return;

    const existingNode = state.nodes.find(n => n.x === gx && n.y === gy);
    if(selectedBuildType) {
        if(!existingNode) {
            const cost = NODE_TYPES[selectedBuildType].cost;
            if(state.coins >= cost) {
                state.coins -= cost;
                state.nodes.push({ x: gx, y: gy, type: selectedBuildType, lvl: 1, cd: 0 });
                updateUI();
                for(let i=0;i<10;i++) state.particles.push({x:gx, y:gy, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:1, color:NODE_TYPES[selectedBuildType].color, size:2});
            }
        }
    } else {
        if(existingNode) openActionPanel(existingNode); else closeActionPanel();
    }
});

function loop() {
    requestAnimationFrame(loop);
    frame++;

    ctx.fillStyle = 'rgba(3, 3, 8, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 【修正】マス目の線をハッキリ見えるように明るいシアン色に変更
    ctx.strokeStyle = 'rgba(0, 255, 255, 0.15)'; 
    ctx.lineWidth = 1;
    for(let i = sidebarWidth; i < canvas.width; i += gridSize) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
    for(let i = 0; i < canvas.height; i += gridSize) { ctx.beginPath(); ctx.moveTo(sidebarWidth, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

    if(state.waveActive) {
        if(enemiesToSpawn > 0) {
            if(--enemySpawnTimer <= 0) { spawnEnemy(); enemiesToSpawn--; enemySpawnTimer = Math.max(8, 50 - state.wave * 1.5); }
        } else if(state.enemies.length === 0) {
            state.waveActive = false; state.wave++; state.coins += 50 + state.wave * 15;
            state.nodes.forEach(n => { if(NODE_TYPES[n.type].type === 'income') state.coins += Math.floor(NODE_TYPES[n.type].value * Math.pow(1.5, n.lvl-1)); });
            els.btnNext.disabled = false; els.btnNext.innerText = 'START WAVE'; updateUI();
        }
    }

    state.nodes.forEach(n => {
        const t = NODE_TYPES[n.type];
        const cDmg = t.dmg * Math.pow(t.type==='income'?1.5:1.2, n.lvl - 1);
        const cRng = t.range * Math.pow(1.05, n.lvl - 1);
        
        ctx.fillStyle = '#112233'; ctx.fillRect(n.x - gridSize/2 + 2, n.y - gridSize/2 + 2, gridSize-4, gridSize-4);
        ctx.beginPath(); ctx.arc(n.x, n.y, 8 + n.lvl, 0, Math.PI*2); ctx.fillStyle = t.color; ctx.fill();

        if (t.type === 'income') return;
        let target = null; let minDist = cRng;
        state.enemies.forEach(e => { const d = Math.hypot(e.x - n.x, e.y - n.y); if(d < minDist) { minDist = d; target = e; } });

        if(n.cd > 0) n.cd--;
        if(target && n.cd <= 0) {
            if(t.type === 'beam') {
                ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(target.x, target.y); ctx.strokeStyle = t.color; ctx.lineWidth = 2 + n.lvl; ctx.stroke();
                target.hp -= cDmg;
            } else if (t.type === 'stun') {
                ctx.beginPath(); ctx.arc(n.x, n.y, cRng, 0, Math.PI*2); ctx.fillStyle = 'rgba(170,170,170,0.3)'; ctx.fill();
                state.enemies.forEach(e => { if(Math.hypot(e.x-n.x, e.y-n.y) <= cRng) { e.stunTimer = t.time; e.hp -= cDmg; } });
            } else {
                const a = Math.atan2(target.y - n.y, target.x - n.x);
                state.bullets.push({x: n.x, y: n.y, vx: Math.cos(a)*12, vy: Math.sin(a)*12, type: t.type, dmg: cDmg, props: t, lvl: n.lvl, life: 100});
            }
            n.cd = Math.max(1, t.rate * Math.pow(0.95, n.lvl - 1));
        }
    });

    for(let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fillStyle = b.props.color; ctx.fill();
        if(b.life <= 0) { state.bullets.splice(i, 1); continue; }
        
        for(let j = state.enemies.length - 1; j >= 0; j--) {
            const e = state.enemies[j];
            if(Math.hypot(b.x - e.x, b.y - e.y) < e.radius + 4) {
                if(b.type === 'splash') {
                    const r = b.props.radius * Math.pow(1.1, b.lvl-1);
                    state.enemies.forEach(se => { if(Math.hypot(se.x-b.x, se.y-b.y) <= r) se.hp -= b.dmg; });
                } else { e.hp -= b.dmg; }
                if(b.type === 'slow') { e.slow = b.props.factor; e.sTimer = b.props.time; }
                if(b.type === 'poison') { e.pDmg = b.props.dot * Math.pow(1.2, b.lvl-1); e.pTimer = b.props.dotTime; }
                state.bullets.splice(i, 1); break;
            }
        }
    }

    for(let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        if (e.stunTimer > 0) e.stunTimer--;
        if (e.sTimer > 0) e.sTimer--; else e.slow = 1;
        if (e.pTimer > 0) { e.pTimer--; if(frame % 30 === 0) e.hp -= e.pDmg; }
        
        if (e.stunTimer <= 0) {
            const a = Math.atan2(corePos.y - e.y, corePos.x - e.x);
            e.x += Math.cos(a) * e.speed * e.slow; e.y += Math.sin(a) * e.speed * e.slow;
        }
        
        ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); 
        ctx.fillStyle = e.stunTimer>0 ? '#fff' : (e.sTimer>0 ? '#0ff' : (e.pTimer>0 ? '#0f0' : e.color)); ctx.fill();
        ctx.fillStyle = '#0f0'; ctx.fillRect(e.x - 12, e.y - e.radius - 8, 24 * Math.max(0, e.hp/e.maxHp), 4);
        
        if(Math.hypot(e.x - corePos.x, e.y - corePos.y) < 25) { state.coreHp -= e.maxHp * 0.2; updateUI(); state.enemies.splice(i, 1); }
        else if(e.hp <= 0) { state.coins += e.reward; updateUI(); state.enemies.splice(i, 1); }
    }

    for(let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05;
        ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.fillRect(p.x, p.y, p.size, p.size); ctx.globalAlpha = 1;
        if(p.life <= 0) state.particles.splice(i, 1);
    }

    ctx.beginPath(); ctx.arc(corePos.x, corePos.y, 25, 0, Math.PI*2);
    ctx.fillStyle = state.coreHp > 500 ? '#00aaff' : (state.coreHp > 200 ? '#ffaa00' : '#ff0000');
    ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle; ctx.fill(); ctx.shadowBlur = 0;
}

resize();
updateUI();
requestAnimationFrame(loop);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Node Defender: Infinity</title>
<style>
    /* --- 基本設定 --- */
    body { margin: 0; overflow: hidden; background: #020205; color: #e0e0ff; font-family: 'Courier New', Courier, monospace; user-select: none; -webkit-user-select: none; touch-action: none; }
    canvas { display: block; }
    button { font-family: 'Courier New', Courier, monospace; }
    
    /* --- 画面切り替え --- */
    #homeScreen, #battleScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #battleScreen { display: none; } /* 初期状態はホーム画面 */

    /* --- ホーム画面（育成・メニュー） --- */
    #homeScreen { background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 5vh; z-index: 50; overflow-y: auto;}
    .title { font-size: 48px; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin-bottom: 10px; font-weight: bold; text-align: center;}
    .crystal-display { font-size: 24px; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; margin-bottom: 30px; border: 2px solid #ff00ff; padding: 10px 20px; background: rgba(255,0,255,0.1); border-radius: 5px;}
    
    .tech-tree { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 80%; max-width: 1000px; margin-bottom: 40px; }
    .tech-card { background: #050510; border: 1px solid #1a334d; padding: 15px; border-left: 5px solid #ff00ff; transition: 0.2s; }
    .tech-card:hover { border-color: #ff00ff; box-shadow: 0 0 15px rgba(255,0,255,0.3); }
    .tech-name { font-size: 18px; font-weight: bold; color: #fff; display: flex; justify-content: space-between; margin-bottom: 10px;}
    .tech-desc { font-size: 12px; color: #aaa; margin-bottom: 15px; line-height: 1.4; height: 34px;}
    .tech-btn { width: 100%; background: #220022; color: #ff00ff; border: 1px solid #ff00ff; padding: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .tech-btn:hover:not(:disabled) { background: #ff00ff; color: #000; }
    .tech-btn:disabled { border-color: #333; color: #555; background: transparent; cursor: not-allowed; }

    .main-actions { display: flex; gap: 20px; margin-bottom: 50px; }
    .btn-large { font-size: 20px; padding: 15px 40px; background: #002244; color: #00ffff; border: 2px solid #00ffff; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; box-shadow: 0 0 15px rgba(0,255,255,0.2); }
    .btn-large:hover { background: #00ffff; color: #000; box-shadow: 0 0 30px #00ffff; }

    /* --- バトル画面UI --- */
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; }
    #sidebar { width: 340px; background: rgba(5, 5, 15, 0.95); border-right: 1px solid #00ffff; display: flex; flex-direction: column; pointer-events: auto; z-index: 10; height: 100vh; }
    #stats { padding: 15px; border-bottom: 1px solid #1a334d; background: #0a0a1a; }
    .stat-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-bottom: 8px; color: #00ffff; }
    .stat-row span { color: #ffffff; text-shadow: 0 0 8px #00ffff; }
    
    #controls { padding: 10px; border-bottom: 1px solid #1a334d; display: grid; grid-template-columns: 1fr; gap: 5px; }
    .btn { background: #001122; border: 1px solid #00ffff; color: #00ffff; padding: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; transition: 0.2s; }
    .btn:hover:not(:disabled) { background: #00ffff; color: #000; }
    .btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }
    #btnNextWave { padding: 15px; font-size: 14px; background: #002244; margin-bottom: 5px; }
    .btn-retreat { border-color: #ff3366; color: #ff3366; }
    .btn-retreat:hover { background: #ff3366; color: #000; box-shadow: 0 0 10px #ff3366;}

    #buildMenu { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; gap: 8px; align-content: start;}
    #buildMenu::-webkit-scrollbar { width: 4px; }
    #buildMenu::-webkit-scrollbar-thumb { background: #00ffff; }
    
    .node-card { background: #080814; border: 1px solid #1a334d; border-left: 4px solid #00ffff; padding: 8px; cursor: pointer; transition: 0.2s; position: relative; }
    .node-card:hover { background: #112233; border-color: #00ffff; }
    .node-card.selected { background: #112244; border-color: #00ffff; box-shadow: 0 0 15px rgba(0,255,255,0.4); transform: scale(0.98); }
    .node-card.disabled { opacity: 0.3; filter: grayscale(100%); }
    .n-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .n-name { font-weight: bold; font-size: 13px; color: #fff; }
    .n-cost { color: #ffea00; font-weight: bold; font-size: 12px; }
    .n-desc { font-size: 10px; color: #aaa; margin-bottom: 4px; line-height: 1.2; }
    .n-tags { font-size: 9px; color: #0f0; }

    /* --- アクションパネル（タワー強化・設定） --- */
    #actionPanel { position: absolute; bottom: 20px; left: 360px; background: rgba(5, 5, 15, 0.95); padding: 15px; border: 1px solid #00ffff; pointer-events: auto; display: none; z-index: 10; width: 280px; backdrop-filter: blur(5px); }
    #actionPanel h3 { margin: 0 0 10px 0; color: #00ffff; border-bottom: 1px solid #1a334d; padding-bottom: 5px; font-size: 16px; display: flex; justify-content: space-between;}
    
    .target-settings { margin-bottom: 10px; border: 1px solid #1a334d; padding: 5px; background: #050510; }
    .target-settings label { font-size: 10px; color: #aaa; display: block; margin-bottom: 4px; }
    .target-options { display: flex; gap: 2px; }
    .t-opt { flex: 1; font-size: 9px; padding: 4px 0; background: #111; border: 1px solid #333; color: #888; cursor: pointer; text-align: center; }
    .t-opt.active { background: #00ffff; color: #000; border-color: #00ffff; font-weight: bold; }

    .ap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; font-size: 12px; }
    .ap-grid div { color: #888; display: flex; justify-content: space-between; border-bottom: 1px dotted #333; padding-bottom: 2px; }
    .ap-grid span { color: #fff; font-weight: bold; }
    .ap-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

    /* --- セーブ/ロード モーダル --- */
    #saveLoadModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a1a; border: 2px solid #ff00ff; padding: 25px; z-index: 100; width: 400px; text-align: center; box-shadow: 0 0 40px rgba(255,0,255,0.3); }
    #saveLoadModal h2 { margin-top: 0; color: #ff00ff; }
    #slTextarea { width: 100%; height: 100px; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; font-size: 11px; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 15px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }

    /* リザルト画面 */
    #resultScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
    #resultTitle { font-size: 50px; color: #ff3366; margin-bottom: 20px; text-shadow: 0 0 20px #ff3366; }
    #resultDetails { font-size: 20px; color: #fff; margin-bottom: 30px; text-align: center; line-height: 1.5; }
    .earned-crystal { font-size: 30px; color: #ff00ff; font-weight: bold; text-shadow: 0 0 15px #ff00ff; margin-bottom: 40px; }

    @media (max-width: 768px) {
        #sidebar { width: 180px; }
        .n-desc, .n-tags { display: none; }
        .tech-tree { width: 95%; }
        #actionPanel { left: 190px; bottom: 10px; padding: 10px; width: 200px; }
    }
</style>
</head>
<body>

<div id="homeScreen">
    <div class="title">NODE DEFENDER<br><span style="font-size: 24px; color: #aaa;">INFINITY</span></div>
    
    <div class="crystal-display">DATA CRYSTALS: <span id="uiMetaCrystals">0</span> DC</div>
    
    <div class="main-actions">
        <button id="btnStartGame" class="btn-large">SYSTEM START (BATTLE)</button>
        <button id="btnDataLink" class="btn-large" style="background:#220022; border-color:#ff00ff; color:#ff00ff;">DATA LINK (SAVE/LOAD)</button>
    </div>

    <h2 style="color: #ff00ff; border-bottom: 1px solid #ff00ff; width: 80%; max-width: 1000px; padding-bottom: 10px;">PERMANENT UPGRADES</h2>
    <div class="tech-tree" id="techTree">
        </div>
</div>

<div id="battleScreen">
    <div id="ui">
        <div id="sidebar">
            <div id="stats">
                <div class="stat-row">WAVE <span><span id="uiWave">1</span></span></div>
                <div class="stat-row">CORE HP <span><span id="uiCore">1000</span></span></div>
                <div class="stat-row">CREDIT <span><span id="uiCoins">1000</span></span></div>
            </div>
            <div id="controls">
                <button id="btnNextWave" class="btn">START WAVE</button>
                <button id="btnRetreat" class="btn btn-retreat">ABORT & RETURN</button>
            </div>
            <div id="buildMenu"></div>
        </div>
    </div>

    <div id="actionPanel">
        <h3><span id="apName">NODE</span><span id="apLvl" style="color:#fff;">Lv.1</span></h3>
        
        <div class="target-settings" id="targetSettings">
            <label>TARGETING ALGORITHM</label>
            <div class="target-options">
                <div class="t-opt active" data-tgt="first">FIRST</div>
                <div class="t-opt" data-tgt="close">CLOSE</div>
                <div class="t-opt" data-tgt="strong">STRONG</div>
                <div class="t-opt" data-tgt="weak">WEAK</div>
            </div>
        </div>

        <div class="ap-grid">
            <div>DMG <span id="apDmg">0</span></div>
            <div>RNG <span id="apRng">0</span></div>
            <div>SPD <span id="apRate">0</span></div>
            <div>EFF <span id="apEff">-</span></div>
        </div>
        <div class="ap-actions">
            <button id="btnUpg" class="btn">UPGRADE <br><span id="apCost" style="font-size:10px;">$0</span></button>
            <button id="btnSell" class="btn btn-retreat">SELL <br><span id="apSell" style="font-size:10px;">$0</span></button>
            <button id="btnClose" class="btn" style="border-color:#555; color:#aaa; grid-column: span 2;">CLOSE</button>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>
</div>

<div id="saveLoadModal">
    <h2 id="slTitle">DATA LINK</h2>
    <p style="font-size: 12px; color: #aaa; margin-bottom:15px;">※クリスタルと強化状態が保存されます。</p>
    <textarea id="slTextarea" placeholder="ここにセーブコードを貼り付けます..."></textarea>
    <div class="modal-btns">
        <button id="btnCopySave" class="btn" style="border-color:#ff00ff; color:#ff00ff;">COPY CODE</button>
        <button id="btnLoadData" class="btn" style="border-color:#00ffff; color:#00ffff;">LOAD CODE</button>
        <button id="btnCancelSL" class="btn" style="border-color:#555; color:#aaa;">CLOSE</button>
    </div>
</div>

<div id="resultScreen">
    <div id="resultTitle">SYSTEM DOWN</div>
    <div id="resultDetails">
        REACHED WAVE: <span id="resWave" style="color:#00ffff; font-weight:bold;">1</span><br>
        ENEMIES DESTROYED: <span id="resKills" style="color:#00ffff; font-weight:bold;">0</span>
    </div>
    <div style="color:#aaa; font-size:14px; margin-bottom:5px;">EARNED DATA CRYSTALS</div>
    <div class="earned-crystal">+<span id="resCrystals">0</span> DC</div>
    <button id="btnReturnHome" class="btn-large" style="font-size: 16px;">RETURN TO BASE</button>
</div>

<script>
// --- 【パート2：データ定義、メタプログレッション、セーブ・ロード】 ---

// 🚀 超拡張！全15種類の防衛タワー（ノード）データ
// 新たに SHOTGUN, BLACKHOLE, MISSILE が追加されました！
const NODE_TYPES = {
    blaster:  { name: 'BLASTER', cost: 50,  dmg: 15, range: 120, rate: 30,  color: '#ffffff', type: 'normal', desc: '安価で扱いやすい基本砲台。', tags: '単体 / 標準', req: null },
    vulcan:   { name: 'VULCAN',  cost: 120, dmg: 4,  range: 100, rate: 5,   color: '#ffff00', type: 'normal', desc: '圧倒的な連射速度で弾幕を張る。', tags: '単体 / 超速', req: 'tower_vulcan' },
    shotgun:  { name: 'SHOTGUN', cost: 180, dmg: 10, range: 90,  rate: 45,  color: '#dddddd', type: 'spread', count: 5, spread: 0.4, desc: '近距離に複数の散弾を同時に放つ。', tags: '複数 / 散弾', req: 'tower_shotgun' },
    mortar:   { name: 'MORTAR',  cost: 200, dmg: 40, range: 160, rate: 90,  color: '#ff5500', type: 'splash', radius: 80, desc: '着弾時に爆発し、範囲内の敵を一掃する。', tags: '範囲 / 爆発', req: 'tower_mortar' },
    cryo:     { name: 'CRYO',    cost: 160, dmg: 5,  range: 130, rate: 60,  color: '#00ffff', type: 'slow', factor: 0.4, time: 180, desc: '冷却弾で敵の移動速度を大幅に下げる。', tags: '妨害 / 鈍足', req: 'tower_cryo' },
    toxin:    { name: 'TOXIN',   cost: 220, dmg: 2,  range: 140, rate: 45,  color: '#00ff00', type: 'poison', dot: 10, dotTime: 300, desc: '猛毒を付与し、長時間じわじわと削る。', tags: '継続 / 毒', req: 'tower_toxin' },
    railgun:  { name: 'RAILGUN', cost: 250, dmg: 180,range: 400, rate: 120, color: '#ff00ff', type: 'normal', desc: '超長距離からの一撃必殺。装填は遅い。', tags: '単体 / 狙撃', req: 'tower_railgun' },
    laser:    { name: 'LASER',   cost: 300, dmg: 3,  range: 220, rate: 1,   color: '#ff0055', type: 'beam', desc: '途切れることのない高熱レーザーを照射。', tags: '単体 / 照射', req: 'tower_laser' },
    miner:    { name: 'MINER',   cost: 300, dmg: 0,  range: 0,   rate: 0,   color: '#ffaa00', type: 'income', value: 80, desc: 'ウェーブ終了時に多額のクレジットを生成。', tags: '支援 / 資金', req: 'tower_miner' },
    emp:      { name: 'EMP',     cost: 350, dmg: 5,  range: 120, rate: 150, color: '#aaaaaa', type: 'stun', time: 120, desc: '電磁パルスで周囲の敵を一定時間完全に麻痺。', tags: '範囲 / 停止', req: 'tower_emp' },
    tesla:    { name: 'TESLA',   cost: 400, dmg: 35, range: 150, rate: 70,  color: '#00aaff', type: 'chain', chainCount: 4, desc: '敵から敵へ連鎖する電撃を放つ。', tags: '複数 / 連鎖雷', req: 'tower_tesla' },
    buffer:   { name: 'OVERCLOCK',cost:450, dmg: 0,  range: 110, rate: 0,   color: '#ffbbff', type: 'buff', buffRate: 0.70, buffDmg: 1.4, desc: '周囲のタワーの攻撃力と連射速度を永続強化。', tags: '支援 / 強化', req: 'tower_buffer' },
    plasma:   { name: 'PLASMA',  cost: 500, dmg: 10, range: 180, rate: 80,  color: '#ff2222', type: 'percent', pct: 0.06, desc: '敵の最大HPの6%を追加ダメージとして与える。', tags: '単体 / 割合ダメ', req: 'tower_plasma' },
    blackhole:{ name: 'BLACKHOLE',cost:600, dmg: 5,  range: 180, rate: 200, color: '#4b0082', type: 'pull', pullTime: 120, pullForce: 2, desc: '敵を中心部に強烈に吸い寄せる重力場を生成。', tags: '妨害 / 吸引', req: 'tower_blackhole' },
    missile:  { name: 'MISSILE', cost: 750, dmg: 100,range: 9999,rate: 180, color: '#ff8800', type: 'homing', desc: '画面内の敵を確実に追尾する強力なミサイル。', tags: '単体 / 必中', req: 'tower_missile' }
};

// 💎 永続強化（メタプログレッション）のツリーデータ
// これらをクリスタルで強化していくことで、基礎ステータスが上がったり新しいタワーが解禁されます。
const UPGRADES = {
    core_hp:      { id: 'core_hp', name: 'CORE ARMOR', desc: '初期コアHPを増加 (+200/Lv)', baseCost: 10, costMult: 1.5, maxLv: 50 },
    start_credit: { id: 'start_credit', name: 'INITIAL FUNDING', desc: 'ゲーム開始時の初期資金を増加 (+200/Lv)', baseCost: 15, costMult: 1.6, maxLv: 30 },
    crystal_gain: { id: 'crystal_gain', name: 'CRYSTAL EXTRACTION', desc: '敵討伐時のクリスタル獲得量が上昇 (+10%/Lv)', baseCost: 50, costMult: 2.0, maxLv: 20 },
    global_dmg:   { id: 'global_dmg', name: 'WEAPON CALIBRATION', desc: '全タワーの基本攻撃力が底上げされる (+5%/Lv)', baseCost: 80, costMult: 1.8, maxLv: 30 },
    global_rng:   { id: 'global_rng', name: 'SENSOR EXPANSION', desc: '全タワーの基本射程が拡大する (+3%/Lv)', baseCost: 100, costMult: 1.7, maxLv: 15 },
    
    // 以下、タワーのアンロック（Lv1で解放）
    tower_vulcan: { id: 'tower_vulcan', name: 'UNLOCK: VULCAN', desc: '超速連射タワー「VULCAN」を解禁。', baseCost: 20, costMult: 1, maxLv: 1 },
    tower_shotgun:{ id: 'tower_shotgun', name: 'UNLOCK: SHOTGUN', desc: '散弾タワー「SHOTGUN」を解禁。', baseCost: 50, costMult: 1, maxLv: 1 },
    tower_mortar: { id: 'tower_mortar', name: 'UNLOCK: MORTAR', desc: '範囲爆発タワー「MORTAR」を解禁。', baseCost: 80, costMult: 1, maxLv: 1 },
    tower_cryo:   { id: 'tower_cryo', name: 'UNLOCK: CRYO', desc: '鈍足付与タワー「CRYO」を解禁。', baseCost: 120, costMult: 1, maxLv: 1 },
    tower_toxin:  { id: 'tower_toxin', name: 'UNLOCK: TOXIN', desc: '毒付与タワー「TOXIN」を解禁。', baseCost: 180, costMult: 1, maxLv: 1 },
    tower_railgun:{ id: 'tower_railgun', name: 'UNLOCK: RAILGUN', desc: '狙撃タワー「RAILGUN」を解禁。', baseCost: 250, costMult: 1, maxLv: 1 },
    tower_laser:  { id: 'tower_laser', name: 'UNLOCK: LASER', desc: '照射タワー「LASER」を解禁。', baseCost: 350, costMult: 1, maxLv: 1 },
    tower_miner:  { id: 'tower_miner', name: 'UNLOCK: MINER', desc: '資金調達タワー「MINER」を解禁。', baseCost: 500, costMult: 1, maxLv: 1 },
    tower_emp:    { id: 'tower_emp', name: 'UNLOCK: EMP', desc: '麻痺タワー「EMP」を解禁。', baseCost: 700, costMult: 1, maxLv: 1 },
    tower_tesla:  { id: 'tower_tesla', name: 'UNLOCK: TESLA', desc: '連鎖雷タワー「TESLA」を解禁。', baseCost: 1000, costMult: 1, maxLv: 1 },
    tower_buffer: { id: 'tower_buffer', name: 'UNLOCK: OVERCLOCK', desc: '強化タワー「OVERCLOCK」を解禁。', baseCost: 1500, costMult: 1, maxLv: 1 },
    tower_plasma: { id: 'tower_plasma', name: 'UNLOCK: PLASMA', desc: '割合ダメタワー「PLASMA」を解禁。', baseCost: 2500, costMult: 1, maxLv: 1 },
    tower_blackhole:{ id: 'tower_blackhole', name: 'UNLOCK: BLACKHOLE', desc: '吸引タワー「BLACKHOLE」を解禁。', baseCost: 4000, costMult: 1, maxLv: 1 },
    tower_missile:{ id: 'tower_missile', name: 'UNLOCK: MISSILE', desc: '必中タワー「MISSILE」を解禁。', baseCost: 8000, costMult: 1, maxLv: 1 }
};

// プレイヤーのアカウントデータ（セーブされるデータ）
let metaState = {
    crystals: 0,
    upgrades: {} // { core_hp: 2, start_credit: 1, tower_vulcan: 1 ... } のように保存
};

// 1ゲームプレイ中の状態
let gameState = {
    wave: 1, coreHp: 1000, coins: 1000, waveActive: false,
    nodes: [], enemies: [], bullets: [], particles: [],
    earnedCrystalsThisRun: 0 // 今回のプレイで稼いだクリスタル
};

// --- DOM要素の取得 ---
const UI = {
    home: document.getElementById('homeScreen'),
    battle: document.getElementById('battleScreen'),
    result: document.getElementById('resultScreen'),
    techTree: document.getElementById('techTree'),
    metaCrystals: document.getElementById('uiMetaCrystals'),
    
    // Modal
    slModal: document.getElementById('saveLoadModal'),
    slText: document.getElementById('slTextarea'),
    btnSaveMode: document.getElementById('btnDataLink'),
    btnCopy: document.getElementById('btnCopySave'),
    btnLoad: document.getElementById('btnLoadData'),
    btnCancelSL: document.getElementById('btnCancelSL'),
};

// --- セーブ＆ロード処理（ローカルストレージ ＋ 文字列） ---
// ゲーム起動時に自動ロード（ローカルストレージから）
function loadFromLocal() {
    const saved = localStorage.getItem('NodeDefenderInfinity');
    if(saved) {
        try {
            metaState = JSON.parse(saved);
        } catch(e) { console.error("Save data broken"); }
    }
    // upgradesに未定義のものがあれば初期化（0）
    Object.keys(UPGRADES).forEach(key => {
        if(metaState.upgrades[key] === undefined) metaState.upgrades[key] = 0;
    });
    updateHomeUI();
}

function saveToLocal() {
    localStorage.setItem('NodeDefenderInfinity', JSON.stringify(metaState));
}

// 画面切り替えイベント
UI.btnSaveMode.onclick = () => {
    UI.slText.value = btoa(JSON.stringify(metaState)); // セーブ用文字列を生成して配置
    UI.slModal.style.display = 'block';
};
UI.btnCancelSL.onclick = () => UI.slModal.style.display = 'none';

UI.btnCopy.onclick = () => {
    UI.slText.select();
    document.execCommand('copy');

function updateHomeUI() {
    UI.metaCrystals.innerText = metaState.crystals;
    UI.techTree.innerHTML = ''; // 一旦クリア

    // 定義されたアップグレード項目をループしてカードを生成

        // コスト計算：基本コスト * (倍率 ^ 現在レベル)
        const cost = Math.floor(upg.baseCost * Math.pow(upg.costMult, currentLv));

        const lvText = isMax ? 'MAX' : `Lv.${currentLv}`;
        // クリスタルが足りているか、最大レベルに達していないか判定
        const canBuy = !isMax && metaState.crystals >= cost;

        const card = document.createElement('div');
        card.className = 'tech-card';
        card.innerHTML = `

        `;

    }
}

// 強化ボタンが押された時の処理（HTML側から呼ばれるようグローバル関数にする）
window.buyUpgrade = function(key) {
    const upg = UPGRADES[key];
    const currentLv = metaState.upgrades[key] || 0;
    if (currentLv >= upg.maxLv) return; // 既にMAXなら弾く

    const cost = Math.floor(upg.baseCost * Math.pow(upg.costMult, currentLv));
    if (metaState.crystals >= cost) {
        // クリスタルを消費してレベルアップ
        metaState.crystals -= cost;
        metaState.upgrades[key] = currentLv + 1;
        saveToLocal(); // すぐにセーブ
        updateHomeUI(); // 画面を更新
    }
};

// 画面リサイズとコア位置の計算
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    sidebarWidth = window.innerWidth <= 768 ? 180 : 340;
    updateCorePos();
}
window.addEventListener('resize', resize);

let corePos = { x: 0, y: 0 };
function updateCorePos() {
    corePos.x = Math.floor(((canvas.width - sidebarWidth) / 2 + sidebarWidth) / gridSize) * gridSize + gridSize / 2;
    corePos.y = Math.floor(canvas.height / 2 / gridSize) * gridSize + gridSize / 2;

// バトル画面の初期化（ホーム画面から移行したときに呼ばれる）
function initGame() {
    resize();
    // メタ強化（永続強化）のボーナスを計算
    const bonusHp = (metaState.upgrades.core_hp || 0) * 200;
    const bonusCoins = (metaState.upgrades.start_credit || 0) * 200;

    gameState = {
        wave: 1,
        coreHp: 1000 + bonusHp,
        maxCoreHp: 1000 + bonusHp,
        coins: 1000 + bonusCoins,
        waveActive: false,
        nodes: [], enemies: [], bullets: [], particles: [],
        earnedCrystalsThisRun: 0
    };
    enemySpawnTimer = 0;
    enemiesToSpawn = 0;
    frame = 0;
    selectedBuildType = null;

    updateBattleMenu(); // 建築メニューの生成（解禁状況を反映）
    updateBattleUI();
    closeActionPanel();

    if(!window.loopActive) {
        window.loopActive = true;

}

// 建築メニューの生成（解禁されているタワーのみ選択可能）
function updateBattleMenu() {
    const buildMenu = document.getElementById('buildMenu');
    buildMenu.innerHTML = '';
    
    Object.keys(NODE_TYPES).forEach(key => {
        const t = NODE_TYPES[key];
        // 必須条件(req)がない、またはツリーでLv1以上に強化されているか判定
        const isUnlocked = t.req === null || (metaState.upgrades[t.req] && metaState.upgrades[t.req] > 0);
        
        const card = document.createElement('div');
        card.className = 'node-card ' + (isUnlocked ? '' : 'disabled');
        card.dataset.type = key;
        card.dataset.cost = t.cost;
        card.innerHTML = `
            <div class="n-header">
                <span class="n-name" style="color:${t.color}">${isUnlocked ? t.name : '??? (LOCKED)'}</span>
                <span class="n-cost">$${t.cost}</span>
            </div>
            ${isUnlocked ? `<div class="n-tags">${t.tags}</div><div class="n-desc">${t.desc}</div>` : `<div class="n-desc" style="color:#ff3366">※ホーム画面で解禁してください</div>`}
        `;
        
        card.onclick = () => {
            if(!isUnlocked) return; // 未解禁なら反応しない
            document.querySelectorAll('#buildMenu .node-card').forEach(b => b.classList.remove('selected'));
            if(selectedBuildType === key) {
                selectedBuildType = null;
            } else {
                card.classList.add('selected');
                selectedBuildType = key;
                closeActionPanel();
            }
        };
        buildMenu.appendChild(card);
    });
}

function updateBattleUI() {
    document.getElementById('uiWave').innerText = gameState.wave;
    document.getElementById('uiCore').innerText = Math.floor(gameState.coreHp);
    document.getElementById('uiCoins').innerText = Math.floor(gameState.coins);
    
    // コスト不足のタワーを暗くする
    document.querySelectorAll('#buildMenu .node-card:not(.disabled)').forEach(card => {
        const cost = parseInt(card.dataset.cost);
        card.style.opacity = gameState.coins < cost ? '0.4' : '1';
    });
}

// キャンバス上をクリックしてタワーを配置
canvas.addEventListener('pointerdown', e => {
    if(e.clientX < sidebarWidth) return;
    const gx = Math.floor(e.clientX / gridSize) * gridSize + gridSize / 2;
    const gy = Math.floor(e.clientY / gridSize) * gridSize + gridSize / 2;
    if(gx === corePos.x && gy === corePos.y) return;

    const existingNode = gameState.nodes.find(n => n.x === gx && n.y === gy);
    
    if(selectedBuildType) {
        if(!existingNode) {
            const cost = NODE_TYPES[selectedBuildType].cost;
            if(gameState.coins >= cost) {
                gameState.coins -= cost;
                gameState.nodes.push({ x: gx, y: gy, type: selectedBuildType, lvl: 1, cd: 0, targetMode: 'first' });
                updateBattleUI();
                // 配置エフェクト
                for(let i=0;i<10;i++) gameState.particles.push({x:gx, y:gy, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, life:1, color:NODE_TYPES[selectedBuildType].color, size:2});
            }
        }
    } else {
        if(existingNode) openActionPanel(existingNode); else closeActionPanel();
    }
});

function openActionPanel(node) {
    selectedNode = node; selectedBuildType = null;
    document.querySelectorAll('#buildMenu .node-card').forEach(b => b.classList.remove('selected'));
    
    const t = NODE_TYPES[node.type];
    apUI.name.innerText = t.name; apUI.name.style.color = t.color; apUI.lvl.innerText = 'Lv.' + node.lvl;
    
    // 永続強化（グローバル強化）を反映させたステータス計算
    const globalDmgBonus = 1 + (metaState.upgrades.global_dmg || 0) * 0.05;
    const globalRngBonus = 1 + (metaState.upgrades.global_rng || 0) * 0.03;

    let dmgMulti = t.type === 'income' ? 1.5 : (t.type === 'percent' ? 1.1 : 1.25);
    let currentDmg = (t.dmg * Math.pow(dmgMulti, node.lvl - 1) * globalDmgBonus).toFixed(1);
    if(t.type === 'percent') currentDmg = ((t.pct * Math.pow(1.1, node.lvl - 1)) * 100).toFixed(1) + '%';
    
    apUI.dmg.innerText = (t.type === 'income' || t.type === 'buff' || t.type === 'blackhole') ? '-' : currentDmg;
    apUI.rng.innerText = t.range === 0 ? '-' : (t.range * Math.pow(1.05, node.lvl - 1) * globalRngBonus).toFixed(0);
    apUI.rate.innerText = t.rate === 0 ? '-' : (60/Math.max(1, t.rate * Math.pow(0.95, node.lvl - 1))).toFixed(1)+'/s';
    apUI.eff.innerText = t.type === 'buff' ? 'UP' : (t.type === 'chain' ? t.chainCount+node.lvl-1 : (t.type === 'spread' ? t.count+node.lvl-1 : '-'));

    // ターゲティングUIの表示制御
    if(['normal', 'splash', 'homing', 'percent', 'chain', 'spread'].includes(t.type)) {
        apUI.tgtSettings.style.display = 'block';
        apUI.tgtOpts.forEach(opt => {
            if(opt.dataset.tgt === (node.targetMode || 'first')) opt.classList.add('active');
            else opt.classList.remove('active');
        });
    } else {
        apUI.tgtSettings.style.display = 'none';

    const upgCost = Math.floor(t.cost * Math.pow(1.6, node.lvl));
    const sellValue = Math.floor(t.cost * Math.pow(1.6, node.lvl - 1) * 0.5);
    apUI.cost.innerText = '$' + upgCost; apUI.sell.innerText = '$' + sellValue;
    apUI.btnUpg.disabled = gameState.coins < upgCost;
    apUI.panel.style.display = 'block';
}

// 👿 新規追加：凶悪な敵のギミック一覧
const ENEMY_TYPES = {
    basic:  { color: '#ff3366', speedMult: 1.0, hpMult: 1.0, radius: 10, desc: '標準的な敵' },
    runner: { color: '#ffff00', speedMult: 2.2, hpMult: 0.4, radius:  8, desc: '超高速移動。CRYO(鈍足)が有効' },
    tank:   { color: '#aaaaaa', speedMult: 0.6, hpMult: 2.5, radius: 14, armor: 12, desc: '被ダメを固定値で12カット。RAILGUN等の一撃が重い砲台が有効' },
    swarm:  { color: '#ff88ff', speedMult: 1.2, hpMult: 0.2, radius:  6, count: 5, desc: '5体同時に出現。MORTARやSHOTGUNの範囲攻撃の的' },
    regen:  { color: '#00ff88', speedMult: 0.9, hpMult: 1.5, radius: 12, regen: 0.05, desc: '毎秒最大HPの5%を自動回復。TOXIN(毒)やPLASMAで対処' },
    shield: { color: '#0088ff', speedMult: 1.0, hpMult: 0.8, radius: 12, shieldHits: 15, desc: 'どんな大ダメージも1回として防ぐバリアを15枚持つ。VULCANが天敵' },
    boss:   { color: '#ff0000', speedMult: 0.5, hpMult: 12.0,radius: 25, boss: true, desc: '5WAVE毎に出現するボス。状態異常耐性あり' }
};

// 敵を出現させる処理（ウェーブ進行度に応じて凶悪な敵が解禁）
function spawnEnemy(forceType = null, offsetX = 0, offsetY = 0) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.max(canvas.width, canvas.height) / 2 + 50;
    const ex = corePos.x + Math.cos(angle) * dist + offsetX;
    const ey = corePos.y + Math.sin(angle) * dist + offsetY;
    
    const hpBase = waveEnemyMaxHpBase * Math.pow(1.2, gameState.wave - 1);
    const speedBase = 1.0 + (gameState.wave * 0.05);
    
    // 出現テーブルの構築
    let types = ['basic', 'basic']; // basicの確率を少し高く
    if(gameState.wave >= 2) types.push('runner');
    if(gameState.wave >= 3) types.push('tank');
    if(gameState.wave >= 4) types.push('swarm');
    if(gameState.wave >= 5) types.push('regen');
    if(gameState.wave >= 6) types.push('shield');

    let typeKey = forceType;
    
    // 5ウェーブごとに最後の1体をボスにする
    if(!forceType && gameState.wave % 5 === 0 && enemiesToSpawn === 1) typeKey = 'boss';
    else if(!forceType) typeKey = types[Math.floor(Math.random() * types.length)];

    // SWARM（群れ）の場合は特別処理で複数体スポーン
    if(typeKey === 'swarm' && !forceType) {
        for(let i=0; i<ENEMY_TYPES.swarm.count; i++) {
            spawnEnemy('swarm_child', (Math.random()-0.5)*40, (Math.random()-0.5)*40);
        }
        return;
    }

    let actualType = typeKey === 'swarm_child' ? ENEMY_TYPES.swarm : ENEMY_TYPES[typeKey];
    const hp = hpBase * actualType.hpMult;

    gameState.enemies.push({
        x: ex, y: ey, hp: hp, maxHp: hp, speed: speedBase * actualType.speedMult, radius: actualType.radius,
        eType: typeKey === 'swarm_child' ? 'swarm' : typeKey,
        color: actualType.color,
        armor: actualType.armor || 0,
        shieldHits: actualType.shieldHits || 0,
        regen: actualType.regen || 0,
        boss: actualType.boss || false,
        slowTimer: 0, slowFactor: 1, poisonTimer: 0, stunTimer: 0, pullX: null, pullY: null, pullForce: 0
    });
}

// 🛡️ 新規追加：ダメージ計算処理（装甲やバリアの処理を一括化）
function applyDamage(e, dmg, type) {
    // 1. 回数バリアの判定（毒と割合ダメージ以外はバリアで防がれる）
    if(e.shieldHits > 0 && type !== 'poison' && type !== 'percent') {
        e.shieldHits--;
        for(let k=0;k<3;k++) gameState.particles.push({x:e.x, y:e.y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:1, color:'#0088ff', size:2});
        return; // ダメージ無効化
    }
    
    let actualDmg = dmg;
    // 2. 装甲の判定（毒と割合ダメージは装甲を貫通する）
    if(e.armor > 0 && type !== 'poison' && type !== 'percent') {
        actualDmg = Math.max(1, actualDmg - e.armor); // 装甲値分ダメージを引く（最低1ダメージ）
    }
    
    e.hp -= actualDmg;
}

// 距離計算ヘルパー
function getDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// バフ（強化）の計算
function getTowerBuffs(tower) {
    let dmgMult = 1, rateMult = 1;
    gameState.nodes.forEach(n => {
        if(n.type === 'buffer') {
            const t = NODE_TYPES.buffer;
            const rng = t.range * Math.pow(1.05, n.lvl - 1);
            if(getDist(tower, n) <= rng) { dmgMult *= t.buffDmg; rateMult *= t.buffRate; }
        }
    });
    return { dmgMult, rateMult };
}

// メインループ
function gameLoop() {
    if(!gameState) return;
    
    // 背景とグリッド描画
    ctx.fillStyle = '#020205'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#0a0a1a'; ctx.lineWidth = 1;
    for(let x = sidebarWidth; x < canvas.width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
    for(let y = 0; y < canvas.height; y += gridSize) { ctx.beginPath(); ctx.moveTo(sidebarWidth, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

    // コアの描画
    ctx.fillStyle = '#00ffff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00ffff';
    ctx.beginPath(); ctx.arc(corePos.x, corePos.y, 25, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    
    const globalDmgBonus = 1 + (metaState.upgrades.global_dmg || 0) * 0.05;
    const globalRngBonus = 1 + (metaState.upgrades.global_rng || 0) * 0.03;

    // --- ウェーブ進行と敵スポーン ---
    if(gameState.waveActive) {
        if(enemiesToSpawn > 0) {
            enemySpawnTimer--;
            if(enemySpawnTimer <= 0) {
                spawnEnemy(); enemiesToSpawn--;
                enemySpawnTimer = Math.max(10, 60 - gameState.wave * 2);
            }
        } else if(gameState.enemies.length === 0) {
            gameState.waveActive = false;
            gameState.wave++;
            gameState.nodes.forEach(n => {
                if(n.type === 'miner') {
                    const income = Math.floor(NODE_TYPES.miner.value * Math.pow(1.5, n.lvl - 1));
                    gameState.coins += income;
                    for(let i=0;i<15;i++) gameState.particles.push({x:n.x, y:n.y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:1, color:'#ffaa00', size:3});
                }
            });
            updateBattleUI();
            document.getElementById('btnNextWave').disabled = false;
            document.getElementById('btnNextWave').innerText = 'START WAVE ' + gameState.wave;
        }
    }

    // --- タワーの処理 ---
    gameState.nodes.forEach(node => {
        const t = NODE_TYPES[node.type];
        ctx.fillStyle = t.color;
        ctx.fillRect(node.x - 15, node.y - 15, 30, 30);
        ctx.fillStyle = '#000'; ctx.font = '10px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('L'+node.lvl, node.x, node.y);

        if(selectedNode === node) {
            ctx.strokeStyle = t.color; ctx.lineWidth = 1; ctx.beginPath();
            const rng = t.range * Math.pow(1.05, node.lvl - 1) * globalRngBonus;
            ctx.arc(node.x, node.y, rng, 0, Math.PI*2); ctx.stroke();
        }

        if(t.type === 'income' || t.type === 'buff') return;

        node.cd--;
        if(node.cd <= 0 && gameState.enemies.length > 0) {
            const buffs = getTowerBuffs(node);
            const range = t.range * Math.pow(1.05, node.lvl - 1) * globalRngBonus;
            const dmgMult = (t.type === 'percent') ? 1.1 : 1.25;
            const damage = (t.dmg * Math.pow(dmgMult, node.lvl - 1) * globalDmgBonus * buffs.dmgMult);
            
            let targets = gameState.enemies.filter(e => getDist(node, e) <= range);
            if(targets.length > 0) {
                targets.sort((a, b) => {
                    if(node.targetMode === 'close') return getDist(node, a) - getDist(node, b);
                    if(node.targetMode === 'strong') return b.hp - a.hp;
                    if(node.targetMode === 'weak') return a.hp - b.hp;
                    return getDist(a, corePos) - getDist(b, corePos); 
                });
                
                let target = targets[0];
                let angle = Math.atan2(target.y - node.y, target.x - node.x);

                if(t.type === 'laser') {
                    applyDamage(target, damage, t.type);
                    ctx.strokeStyle = t.color; ctx.lineWidth = 2 + node.lvl;
                    ctx.beginPath(); ctx.moveTo(node.x, node.y); ctx.lineTo(target.x, target.y); ctx.stroke();
                } else if(t.type === 'emp' || t.type === 'blackhole') {
                    targets.forEach(e => {
                        if(t.type === 'emp') { 
                            e.stunTimer = e.boss ? Math.floor(t.time * node.lvl * 0.3) : t.time * node.lvl; // ボスはスタン時間軽減
                            applyDamage(e, damage, t.type);
                        }
                        if(t.type === 'blackhole' && !e.boss) { // ボスはブラックホール無効
                            e.pullX = node.x; e.pullY = node.y; e.pullForce = t.pullForce + (node.lvl*0.5); 
                        }
                    });
                    ctx.strokeStyle = t.color; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(node.x, node.y, range, 0, Math.PI*2); ctx.stroke();
                } else if(t.type === 'chain') {
                    let currentTarget = target;
                    let hitEnemies = new Set([currentTarget]);
                    applyDamage(currentTarget, damage, t.type);
                    let lastX = node.x, lastY = node.y;
                    let chains = t.chainCount + node.lvl - 1;
                    
                    ctx.strokeStyle = t.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(lastX, lastY);
                    
                    for(let i=0; i<chains; i++) {
                        ctx.lineTo(currentTarget.x, currentTarget.y);
                        let nextTargets = gameState.enemies.filter(e => !hitEnemies.has(e) && getDist(currentTarget, e) <= 100);
                        if(nextTargets.length > 0) {
                            nextTargets.sort((a,b) => getDist(currentTarget, a) - getDist(currentTarget, b));
                            currentTarget = nextTargets[0];
                            hitEnemies.add(currentTarget);
                            applyDamage(currentTarget, damage * 0.8, t.type);
                        } else break;
                    }
                    ctx.stroke();
                } else if(t.type === 'spread') {
                    const count = t.count + node.lvl - 1;
                    for(let i=0; i<count; i++) {
                        let offsetAngle = angle + (i - count/2) * t.spread;
                        gameState.bullets.push({x:node.x, y:node.y, vx:Math.cos(offsetAngle)*8, vy:Math.sin(offsetAngle)*8, dmg:damage, type:t.type, color:t.color, tData:t, lvl:node.lvl });
                    }
                } else {
                    gameState.bullets.push({x:node.x, y:node.y, vx:Math.cos(angle)*8, vy:Math.sin(angle)*8, dmg:damage, type:t.type, color:t.color, target:target, tData:t, lvl:node.lvl });
                }
                
                node.cd = Math.max(1, (60 / t.rate) * buffs.rateMult * Math.pow(0.95, node.lvl - 1));
            }
        }
    });

    // --- 弾の処理 ---
    for(let i = gameState.bullets.length - 1; i >= 0; i--) {
        let b = gameState.bullets[i];
        
        if(b.type === 'homing' && b.target && b.target.hp > 0) {
            let angle = Math.atan2(b.target.y - b.y, b.target.x - b.x);
            b.vx = Math.cos(angle)*6; b.vy = Math.sin(angle)*6;
        }
        
        b.x += b.vx; b.y += b.vy;
        
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();

        if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) { gameState.bullets.splice(i, 1); continue; }

        for(let j = 0; j < gameState.enemies.length; j++) {
            let e = gameState.enemies[j];
            if(getDist(b, e) < e.radius + 4) {
                if(b.type === 'splash') {
                    const radius = b.tData.radius + b.lvl * 5;
                    gameState.enemies.forEach(ae => { 
                        if(getDist(b, ae) <= radius) applyDamage(ae, b.dmg, b.type); 
                    });
                    ctx.fillStyle = 'rgba(255,85,0,0.5)'; ctx.beginPath(); ctx.arc(b.x, b.y, radius, 0, Math.PI*2); ctx.fill();
                } else {
                    if(b.type === 'percent') applyDamage(e, e.maxHp * (b.tData.pct * Math.pow(1.1, b.lvl - 1)), b.type);
                    else applyDamage(e, b.dmg, b.type);
                    
                    if(b.type === 'slow') { e.slowTimer = e.boss ? Math.floor(b.tData.time*0.5) : b.tData.time; e.slowFactor = Math.max(0.1, b.tData.factor - (b.lvl*0.02)); }
                    if(b.type === 'poison') { e.poisonTimer = b.tData.dotTime; e.poisonDmg = b.tData.dot * b.lvl; }
                }
                
                for(let k=0;k<5;k++) gameState.particles.push({x:b.x, y:b.y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:1, color:b.color, size:2});
                gameState.bullets.splice(i, 1);
                break;
            }
        }
    }

    // --- 敵の処理 ---
    for(let i = gameState.enemies.length - 1; i >= 0; i--) {
        let e = gameState.enemies[i];
        
        // 再生能力 (REGEN) の処理
        if(e.regen > 0 && e.hp < e.maxHp) {
            e.hp += (e.maxHp * e.regen) / 60; // 毎フレーム少しずつ回復
            if(e.hp > e.maxHp) e.hp = e.maxHp;
        }

        if(e.stunTimer > 0) { e.stunTimer--; }
        else {
            let currentSpeed = e.speed;
            if(e.slowTimer > 0) { e.slowTimer--; currentSpeed *= e.slowFactor; }
            
            if(e.pullX !== null && e.pullY !== null) {
                let pa = Math.atan2(e.pullY - e.y, e.pullX - e.x);
                e.x += Math.cos(pa) * e.pullForce;
                e.y += Math.sin(pa) * e.pullForce;
                e.pullForce *= 0.9;
                if(e.pullForce < 0.1) { e.pullX = null; e.pullY = null; }
            } else {
                let angle = Math.atan2(corePos.y - e.y, corePos.x - e.x);
                e.x += Math.cos(angle) * currentSpeed;
                e.y += Math.sin(angle) * currentSpeed;
            }
        }

        if(e.poisonTimer > 0) {
            e.poisonTimer--;
            if(e.poisonTimer % 30 === 0) applyDamage(e, e.poisonDmg, 'poison'); // 毒はバリアや装甲を無視する
        }

        // コア到達
        if(getDist(e, corePos) < 25 + e.radius) {
            gameState.coreHp -= e.hp;
            updateBattleUI();
            for(let k=0;k<10;k++) gameState.particles.push({x:corePos.x, y:corePos.y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, life:1, color:'#ff0000', size:4});
            gameState.enemies.splice(i, 1);
            if(gameState.coreHp <= 0) { gameOver(); return; }
            continue;
        }

        // 死亡
        if(e.hp <= 0) {
            gameState.coins += e.boss ? 150 : (10 + gameState.wave);
            const crystalDropChance = e.boss ? 1.0 : 0.2; // ボスは100%ドロップ
            if(Math.random() < crystalDropChance) {
                const crystalBonus = 1 + (metaState.upgrades.crystal_gain || 0) * 0.1;
                gameState.earnedCrystalsThisRun += Math.ceil((e.boss ? 10 : 1) * crystalBonus);
            }
            for(let k=0;k< (e.boss ? 30 : 8);k++) gameState.particles.push({x:e.x, y:e.y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, life:1, color:'#fff', size:3});
            gameState.enemies.splice(i, 1);
            updateBattleUI();
        } else {
            // 敵の描画
            ctx.fillStyle = e.stunTimer > 0 ? '#aaaaaa' : (e.poisonTimer > 0 ? '#00ff00' : (e.slowTimer > 0 ? '#00ffff' : e.color));
            
            // TANK（装甲）の場合は四角く描画、それ以外は丸
            ctx.beginPath();
            if(e.armor > 0) {
                ctx.rect(e.x - e.radius, e.y - e.radius, e.radius*2, e.radius*2);
            } else {
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
            }
            ctx.fill();

            // SHIELD（バリア）持ちの場合は青いオーラを描画
            if(e.shieldHits > 0) {
                ctx.strokeStyle = '#0088ff'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius + 4, 0, Math.PI*2); ctx.stroke();
            }

            // ボス専用エフェクト
            if(e.boss) {
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius + 8 + Math.sin(frame*0.1)*2, 0, Math.PI*2); ctx.stroke();
            }

            // HPバー
            ctx.fillStyle = '#f00'; ctx.fillRect(e.x - 10, e.y - 15 - (e.boss?10:0), 20, 3);
            ctx.fillStyle = '#0f0'; ctx.fillRect(e.x - 10, e.y - 15 - (e.boss?10:0), 20 * (e.hp/e.maxHp), 3);
        }
    }

    // --- パーティクルの処理 ---
    for(let i = gameState.particles.length - 1; i >= 0; i--) {
        let p = gameState.particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.05;
        if(p.life <= 0) { gameState.particles.splice(i, 1); continue; }
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    }

    frame++;
    if(window.loopActive) requestAnimationFrame(gameLoop);
}

// ゲームオーバー処理
function gameOver() {
    window.loopActive = false;
    document.getElementById('resWave').innerText = gameState.wave;
    document.getElementById('resKills').innerText = Math.floor(gameState.earnedCrystalsThisRun * 5 + gameState.wave * 10);
    document.getElementById('resCrystals').innerText = gameState.earnedCrystalsThisRun;
    metaState.crystals += gameState.earnedCrystalsThisRun;
    saveToLocal();
    UI.battle.style.display = 'none';
    UI.result.style.display = 'flex';
}
</script>
